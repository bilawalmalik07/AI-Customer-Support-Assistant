<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BrightGear Support</title>
<style>
  :root {
    --navy: #16324a;
    --teal: #1f8a8c;
    --bg: #f6f7f9;
    --bubble-user: #16324a;
    --bubble-bot: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    display: flex;
    justify-content: center;
    padding: 24px;
  }
  .app {
    width: 100%;
    max-width: 640px;
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: column;
    height: 85vh;
    overflow: hidden;
  }
  header {
    background: var(--navy);
    color: #fff;
    padding: 16px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  header h1 { font-size: 16px; margin: 0; }
  header button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    color: #fff;
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 80%;
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.4;
    font-size: 14px;
    white-space: pre-wrap;
  }
  .user {
    align-self: flex-end;
    background: var(--bubble-user);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .bot {
    align-self: flex-start;
    background: var(--bubble-bot);
    border: 1px solid #e2e5e9;
    border-bottom-left-radius: 4px;
  }
  form {
    display: flex;
    border-top: 1px solid #e2e5e9;
    padding: 12px;
    gap: 8px;
  }
  input {
    flex: 1;
    border: 1px solid #d7dbe0;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 14px;
  }
  button[type="submit"] {
    background: var(--teal);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 0 18px;
    font-size: 14px;
    cursor: pointer;
  }
  button[type="submit"]:disabled { opacity: 0.6; cursor: default; }
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>BrightGear Support Assistant</h1>
    <button id="resetBtn">Reset</button>
  </header>
  <div id="messages"></div>
  <form id="chatForm">
    <input id="input" autocomplete="off" placeholder="Ask about orders, returns, warranty..." />
    <button type="submit">Send</button>
  </form>
</div>

<script>
const messagesEl = document.getElementById('messages');
const form = document.getElementById('chatForm');
const input = document.getElementById('input');
const resetBtn = document.getElementById('resetBtn');

function addMessage(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

addMessage("Hi! I'm the BrightGear support assistant. Ask me about orders, returns, shipping, or warranty.", 'bot');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  const text = input.value.trim();
  if (!text) return;
  addMessage(text, 'user');
  input.value = '';
  const submitBtn = form.querySelector('button[type="submit"]');
  submitBtn.disabled = true;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text })
    });
    const data = await res.json();
    addMessage(data.reply || data.error || 'Something went wrong.', 'bot');
  } catch (err) {
    addMessage('Network error. Please try again.', 'bot');
  } finally {
    submitBtn.disabled = false;
  }
});

resetBtn.addEventListener('click', async () => {
  await fetch('/api/reset', { method: 'POST' });
  messagesEl.innerHTML = '';
  addMessage("Chat reset. How can I help?", 'bot');
});
</script>
</body>
</html>
